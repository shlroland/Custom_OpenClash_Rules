# Developer tool domain rules maintained for Custom_OpenClash_Rules.
# Used by my-cfg/Custom_Clash.ini via the "🛠️ 开发者工具" policy group.

payload:
  # Package managers and language registries
  - '+.npmjs.org'
  - '+.npmjs.com'
  - '+.yarnpkg.com'
  - '+.pnpm.io'
  - '+.nodejs.org'
  - '+.bun.sh'
  - '+.deno.com'
  - '+.deno.land'
  - '+.jsr.io'
  - '+.pypi.org'
  - '+.pythonhosted.org'
  - '+.astral.sh'
  - '+.crates.io'
  - '+.rust-lang.org'
  - '+.rustup.rs'
  - '+.golang.org'
  - '+.go.dev'
  - '+.goproxy.io'
  - '+.proxy.golang.org'
  - '+.sum.golang.org'
  - '+.pkg.go.dev'
  - '+.repo.maven.apache.org'
  - '+.maven.org'
  - '+.gradle.org'
  - '+.rubygems.org'
  - '+.packagist.org'

  # Frontend CDNs and playground dependencies
  - '+.unpkg.com'
  - '+.jsdelivr.net'
  - '+.esm.sh'
  - '+.skypack.dev'
  - '+.cdnjs.com'
