  - '+.marketplace.visualstudio.com'
  - '+.vscode.dev'
  - '+.open-vsx.org'
  - '+.jetbrains.com'
  - '+.postman.com'
  - '+.insomnia.rest'

  # DevOps, observability, and cloud developer platforms
  - '+.hashicorp.com'
  - '+.terraform.io'
  - '+.sentry.io'
  - '+.datadoghq.com'
  - '+.grafana.com'
  - '+.prometheus.io'
  - '+.cloudflare.com'
