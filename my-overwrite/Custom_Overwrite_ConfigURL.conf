[General]
# Use EN_KEY1 as a fully converted Clash/Mihomo config URL.
# This is the best fit when the subscription URL already includes conversion
# and may aggregate multiple upstream subscriptions.

CONFIG_FILE = /etc/openclash/config/My_Remote_Converted.yaml
CORE_TYPE = Meta

# DNS
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 0
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 1
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
    CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 0
CUSTOM_NAME_POLICY = 0
CUSTOM_HOST = 0
CUSTOM_FALLBACK_FILTER = 0

# IPv6
IPV6_ENABLE = 1
IPV6_DNS = 1
IPV6_MODE = 3
ENABLE_V6_UDP_PROXY = 1

# Proxy mode
EN_MODE = fake-ip-mix
ENABLE_UDP_PROXY = 1
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule

# Firewall/access
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
COMMON_PORTS = 0

# China bypass
CHINA_IP_ROUTE = 1
CHINA_IP6_ROUTE = 1
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = *
CHNR_UPDATE_DAY_TIME = 4

# Sniffer/runtime behavior
ENABLE_META_SNIFFER = 1
    ENABLE_META_SNIFFER_CUSTOM = 1
    ENABLE_META_SNIFFER_PURE_IP = 1
ENABLE_TCP_CONCURRENT = 1
ENABLE_UNIFIED_DELAY = 1
ENABLE_RULE_PROXY = 1
ENABLE_CUSTOM_CLASH_RULES = 1
TOLERANCE = 50
URLTEST_INTERVAL_MOD = 300
GITHUB_ADDRESS_MOD = https://testingcf.jsdelivr.net/

# Geo data
ENABLE_GEOIP_DAT = 1
GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = *
GEO_UPDATE_DAY_TIME = 3
GEO_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
GEOIP_AUTO_UPDATE = 1
GEOIP_UPDATE_WEEK_TIME = *
GEOIP_UPDATE_DAY_TIME = 3
GEOIP_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = *
GEOSITE_UPDATE_DAY_TIME = 3
GEOSITE_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
GEOASN_AUTO_UPDATE = 1
GEOASN_UPDATE_WEEK_TIME = *
GEOASN_UPDATE_DAY_TIME = 3
GEOASN_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

# Misc
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 1
SKIP_PROXY_ADDRESS = 1
SUB_INFO_URL = $EN_KEY1

# EN_KEY1 must be a final Clash/Mihomo YAML config URL, for example a
# subconverter URL that uses my-cfg/Custom_Clash.ini and aggregates one or more
# upstream subscriptions.
DOWNLOAD_FILE = url=$EN_KEY1, path=/etc/openclash/config/My_Remote_Converted.yaml, cron=0 6 * * *, force=true, RESTART=true

[Overwrite]
# No YAML edits are needed because EN_KEY1 already returns the final config.
