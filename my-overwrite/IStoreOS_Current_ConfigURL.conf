[General]
# Snapshot from iStoreOS/OpenClash at 192.168.20.10.
# Use EN_KEY1 as the final converted Clash/Mihomo YAML config URL.
# Intended flow:
#   Sub-Store aggregate URL -> local subconverter with this repo template -> EN_KEY1
# Do not put private subscription URLs or dashboard passwords in this file.

CONFIG_FILE = /etc/openclash/config/My_Remote_Converted.yaml
CORE_TYPE = Meta

# Dashboard and ports
CN_PORT = 9090
PROXY_PORT = 7892
TPROXY_PORT = 7895
HTTP_PORT = 7890
SOCKS_PORT = 7891
MIXED_PORT = 7893
DNS_PORT = 7874

# DNS
ENABLE_REDIRECT_DNS = 1
ENABLE_CUSTOM_DNS = 1
APPEND_DEFAULT_DNS = 0
APPEND_WAN_DNS = 1
STORE_FAKEIP = 1
CUSTOM_FAKEIP_FILTER = 1
    CUSTOM_FAKEIP_FILTER_MODE = blacklist
FAKEIP_RANGE = 198.18.0.1/16
ENABLE_RESPECT_RULES = 1
CUSTOM_NAME_POLICY = 0
CUSTOM_HOST = 0
CUSTOM_FALLBACK_FILTER = 0

# IPv6 is disabled on the inspected router.
IPV6_ENABLE = 0
IPV6_DNS = 0
IPV6_MODE = 0
ENABLE_V6_UDP_PROXY = 0
CHINA_IP6_ROUTE = 0

# Proxy mode
EN_MODE = fake-ip
ENABLE_UDP_PROXY = 1
DISABLE_UDP_QUIC = 1
ROUTER_SELF_PROXY = 1
PROXY_MODE = rule

# Firewall/access
INTRANET_ALLOWED = 1
BYPASS_GATEWAY_COMPATIBLE = 0
COMMON_PORTS = 0

# China bypass
CHINA_IP_ROUTE = 1
CHNR_AUTO_UPDATE = 1
CHNR_UPDATE_WEEK_TIME = 1
CHNR_UPDATE_DAY_TIME = 0
CHNR_CUSTOM_URL = https://ispip.clang.cn/all_cn.txt
CHNR6_CUSTOM_URL = https://ispip.clang.cn/all_cn_ipv6.txt

# Sniffer/runtime behavior
ENABLE_META_SNIFFER = 1
    ENABLE_META_SNIFFER_CUSTOM = 1
    ENABLE_META_SNIFFER_PURE_IP = 1
ENABLE_TCP_CONCURRENT = 1
FIND_PROCESS_MODE = 0
ENABLE_UNIFIED_DELAY = 1
ENABLE_RULE_PROXY = 0
ENABLE_CUSTOM_CLASH_RULES = 0
TOLERANCE = 0
URLTEST_INTERVAL_MOD = 0
URLTEST_ADDRESS_MOD = 0
GITHUB_ADDRESS_MOD = https://fastly.jsdelivr.net/

# Smart is disabled on the inspected router.
AUTO_SMART_SWITCH = 0
SMART_ENABLE_LGBM = 0
SMART_PREFER_ASN = 0
SMART_COLLECT = 0
LGBM_AUTO_UPDATE = 0

# Geo data
ENABLE_GEOIP_DAT = 1
GEODATA_LOADER = 0
GEO_AUTO_UPDATE = 1
GEO_UPDATE_WEEK_TIME = 1
GEO_UPDATE_DAY_TIME = 0
GEO_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
GEOIP_AUTO_UPDATE = 1
GEOIP_UPDATE_WEEK_TIME = 1
GEOIP_UPDATE_DAY_TIME = 0
GEOIP_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
GEOSITE_AUTO_UPDATE = 1
GEOSITE_UPDATE_WEEK_TIME = 1
GEOSITE_UPDATE_DAY_TIME = 0
GEOSITE_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
GEOASN_AUTO_UPDATE = 1
GEOASN_UPDATE_WEEK_TIME = 1
GEOASN_UPDATE_DAY_TIME = 0
GEOASN_CUSTOM_URL = https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

# Misc
GLOBAL_UA = 0
SMALL_FLASH_MEMORY = 0
DISABLE_QUIC_GO_GSO = 1
DELAY_START = 0
SKIP_PROXY_ADDRESS = 0
SUB_INFO_URL = $EN_KEY1

# EN_KEY1 must return a complete Clash/Mihomo YAML config. In the intended
# setup, it is your local converter URL that uses a Sub-Store aggregate
# subscription URL and this repo's my-cfg/Custom_Clash.ini template.
DOWNLOAD_FILE = url=$EN_KEY1, path=/etc/openclash/config/My_Remote_Converted.yaml, cron=0 6 * * *, force=true, RESTART=true

[Overwrite]
# No YAML edits are needed because EN_KEY1 already returns the final config.
